name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install uv
        run: pip install uv
      
      - name: Run Ruff linter
        run: |
          for dir in 0*/; do
            cd $dir
            uv run ruff check .
            cd ..
          done
      
      - name: Check formatting
        run: |
          for dir in 0*/; do
            cd $dir
            uv run ruff format --check .
            cd ..
          done

  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
      
      - name: Terraform Format Check
        working-directory: terraform/environments/dev
        run: terraform fmt -check
      
      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init -backend=false
      
      - name: Terraform Validate
        working-directory: terraform/environments/dev
        run: terraform validate

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [lint]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install uv
        run: pip install uv
      
      - name: Install root dependencies
        run: uv sync
      
      - name: Run unit tests
        run: uv run pytest tests/unit -v
      
      - name: Run integration tests
        run: uv run pytest tests/integration -v
      
      - name: Run benchmarks
        run: uv run pytest tests/benchmarks -v

  test-projects:
    name: Test Projects
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        project:
          - 01-naive-rag
          - 02-multimodal-rag
          - 03-hyde-rag
          - 04-corrective-rag
          - 05-graph-rag
          - 06-hybrid-rag
          - 07-adaptive-rag
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install uv
        run: pip install uv
      
      - name: Install dependencies
        run: |
          cd ${{ matrix.project }}
          uv sync
      
      - name: Lint project
        run: |
          cd ${{ matrix.project }}
          uv run ruff check .